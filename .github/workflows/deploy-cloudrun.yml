name: Deploy ChainAuth Worker to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SERVICE_NAME: chainauth-worker
  REGION: europe-west4

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com

      - name: Deploy to Cloud Run from source
        run: |
          gcloud run deploy "$SERVICE_NAME"             --source .             --region "$REGION"             --platform managed             --allow-unauthenticated             --memory 1Gi             --cpu 1             --timeout 300             --set-env-vars WORKER_TOKEN="${{ secrets.WORKER_TOKEN }}"

      - name: Print worker URL
        run: |
          gcloud run services describe "$SERVICE_NAME"             --region "$REGION"             --format='value(status.url)'
